<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="필기 퀴즈">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>멀티미디어 필기 퀴즈</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top">
      <div>
        <p class="eyebrow">멀티미디어콘텐츠제작전문가</p>
        <h1>필기 문제은행 퀴즈</h1>
      </div>
      <div class="stats" aria-label="오늘 학습 통계">
        <div>
          <span id="todaySolved">0</span>
          <small>푼 문제</small>
        </div>
        <div>
          <span id="todayCorrect">0</span>
          <small>맞힘</small>
        </div>
        <div>
          <span id="todayWrong">0</span>
          <small>틀림</small>
        </div>
      </div>
    </header>

    <main>
      <section class="panel loader">
        <div class="field">
          <label for="fileInput">questions.txt 교체 업로드</label>
          <input id="fileInput" type="file" accept=".txt,text/plain">
        </div>
        <div class="field compact">
          <label for="encodingSelect">인코딩</label>
          <select id="encodingSelect">
            <option value="auto">자동</option>
            <option value="utf-8">UTF-8</option>
            <option value="euc-kr">EUC-KR/CP949</option>
          </select>
        </div>
        <button id="loadSampleBtn" type="button">기본 questions.txt 불러오기</button>
      </section>

      <section class="toolbar">
        <button id="newSetBtn" type="button" disabled>랜덤 5문제</button>
        <button id="gradeBtn" type="button" disabled>채점</button>
        <button id="retryWrongBtn" type="button" disabled>오답 다시 풀기</button>
        <button id="exportBtn" type="button">결과 내보내기</button>
      </section>

      <section class="status" id="statusBox">
        내장 문제은행을 불러오는 중입니다.
      </section>

      <section id="quizList" class="quiz-list" aria-live="polite"></section>
    </main>
  </div>

  <template id="questionTemplate">
    <article class="question-card">
      <div class="question-head">
        <span class="badge question-number"></span>
        <span class="subject"></span>
      </div>
      <p class="question-text"></p>
      <div class="choices"></div>
      <div class="answer-box"></div>
      <div class="result"></div>
      <details class="explanation">
        <summary>해설 보기</summary>
        <p class="explanation-text"></p>
        <p class="keyword-text"></p>
      </details>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
